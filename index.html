<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Air Hockey Pro Mejorado</title>

<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
    }

    canvas {
        background: #0a3d2e;
        border: 4px solid white;
    }

    #score {
        position: absolute;
        top: 20px;
        font-size: 28px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div id="score">0 - 0</div>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDiv = document.getElementById("score");

// =====================
// SONIDOS
// =====================
const hitSound = new Audio("https://actions.google.com/sounds/v1/impacts/wood_plank_flicks.ogg");
const goalSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// =====================
// MARCADOR
// =====================
let score1 = 0; // derecha (flechas)
let score2 = 0; // izquierda (WASD)

// =====================
// PORTERÍA
// =====================
const goalHeight = 140;
const goalTop = (canvas.height / 2) - (goalHeight / 2);
const goalBottom = goalTop + goalHeight;

// =====================
// PUCK
// =====================
const puck = {
    x: 400,
    y: 200,
    radius: 10,
    speedX: 5,
    speedY: 3
};

// =====================
// JUGADORES
// =====================

// izquierda (WASD)
const player2 = {
    x: 100,
    y: 200,
    radius: 20,
    speed: 6
};

// derecha (flechas)
const player1 = {
    x: 700,
    y: 200,
    radius: 20,
    speed: 6
};

// =====================
// CONTROLES
// =====================
const keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// =====================
// MOVIMIENTO JUGADORES
// =====================
function movePlayers() {

    // jugador 1 (derecha)
    if (keys["ArrowUp"]) player1.y -= player1.speed;
    if (keys["ArrowDown"]) player1.y += player1.speed;
    if (keys["ArrowLeft"]) player1.x -= player1.speed;
    if (keys["ArrowRight"]) player1.x += player1.speed;

    // jugador 2 (izquierda)
    if (keys["w"] || keys["W"]) player2.y -= player2.speed;
    if (keys["s"] || keys["S"]) player2.y += player2.speed;
    if (keys["a"] || keys["A"]) player2.x -= player2.speed;
    if (keys["d"] || keys["D"]) player2.x += player2.speed;

    // límites
    [player1, player2].forEach(p => {
        p.x = Math.max(p.radius, Math.min(canvas.width - p.radius, p.x));
        p.y = Math.max(p.radius, Math.min(canvas.height - p.radius, p.y));
    });
}

// =====================
// MOVIMIENTO PUCK
// =====================
function movePuck() {
    puck.x += puck.speedX;
    puck.y += puck.speedY;

    // rebote arriba/abajo
    if (puck.y <= puck.radius || puck.y >= canvas.height - puck.radius) {
        puck.speedY *= -1;
    }

    // fricción leve (no mata el juego)
    puck.speedX *= 0.999;
    puck.speedY *= 0.999;

    // límite de velocidad
    const maxSpeed = 12;
    puck.speedX = Math.max(-maxSpeed, Math.min(maxSpeed, puck.speedX));
    puck.speedY = Math.max(-maxSpeed, Math.min(maxSpeed, puck.speedY));

    checkGoal();
}

// =====================
// GOLES (solo si entra en portería)
// =====================
function checkGoal() {

    // izquierda → gol jugador 1
    if (puck.x <= 0) {
        if (puck.y >= goalTop && puck.y <= goalBottom) {
            score1++;
            goalSound.play();
            reset();
        } else {
            puck.speedX *= -1;
            puck.x = puck.radius;
        }
    }

    // derecha → gol jugador 2
    if (puck.x >= canvas.width) {
        if (puck.y >= goalTop && puck.y <= goalBottom) {
            score2++;
            goalSound.play();
            reset();
        } else {
            puck.speedX *= -1;
            puck.x = canvas.width - puck.radius;
        }
    }

    updateScore();
}

// =====================
// COLISIÓN MEJORADA
// =====================
function collide(player) {
    const dx = puck.x - player.x;
    const dy = puck.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < puck.radius + player.radius) {

        const angle = Math.atan2(dy, dx);

        let speed = Math.sqrt(puck.speedX ** 2 + puck.speedY ** 2);

        // mínimo impulso para que nunca se detenga
        speed = Math.max(speed, 6);

        const bounce = 1.2;

        puck.speedX = Math.cos(angle) * speed * bounce;
        puck.speedY = Math.sin(angle) * speed * bounce;

        // separar objetos (evita pegado)
        const overlap = (puck.radius + player.radius) - dist;
        puck.x += Math.cos(angle) * overlap * 0.5;
        puck.y += Math.sin(angle) * overlap * 0.5;

        hitSound.play();
    }
}

// =====================
// RESET
// =====================
function reset() {
    puck.x = canvas.width / 2;
    puck.y = canvas.height / 2;

    puck.speedX = (Math.random() > 0.5 ? 5 : -5);
    puck.speedY = (Math.random() > 0.5 ? 3 : -3);
}

// =====================
// UI
// =====================
function updateScore() {
    scoreDiv.innerText = `${score2} - ${score1}`;
}

// =====================
// DIBUJO
// =====================
function drawCircle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
}

function drawGoals() {
    ctx.fillStyle = "yellow";
    ctx.fillRect(0, goalTop, 5, goalHeight);
    ctx.fillRect(canvas.width - 5, goalTop, 5, goalHeight);
}

// =====================
// LOOP
// =====================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // línea central
    ctx.strokeStyle = "white";
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();

    drawGoals();

    drawCircle(puck.x, puck.y, puck.radius, "white");
    drawCircle(player1.x, player1.y, player1.radius, "blue");
    drawCircle(player2.x, player2.y, player2.radius, "red");
}

function loop() {
    movePlayers();
    movePuck();

    collide(player1);
    collide(player2);

    draw();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
